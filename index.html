<style>
/* ============================================================
   POTLAB — design tokens
   Obsidian dark base · emerald UI accent
   Kit coding: netherite = ash-bronze, diamond = glacier blue
   ============================================================ */
:root{
  --void:#0a0d12;          /* page background */
  --deep:#10151d;          /* cards */
  --raise:#151c26;         /* hover / raised surfaces */
  --line:#232c3a;          /* borders */
  --line-soft:#1a212d;
  --text:#e9eef5;
  --dim:#94a2b5;
  --faint:#5c6a7d;

  --emerald:#3ddc84;       /* primary action accent */
  --emerald-dim:#1d5c3c;
  --diamond:#45c8ff;       /* diamond pot */
  --diamond-dim:#144257;
  --nether:#c9a184;        /* netherite pot */
  --nether-dim:#4a3527;
  --steel:#b18cf0;         /* sword */
  --steel-dim:#2e2350;
  --smp:#2ec9c9;           /* smp (teal) */
  --smp-dim:#123f3f;
  --diasmp:#e87ac0;        /* diamond smp (rose) */
  --diasmp-dim:#42203a;
  --crystal:#a05cff;       /* crystal (vivid purple) */
  --crystal-dim:#2b1a4d;
  --mace:#f0a838;          /* mace (amber/gold) */
  --mace-dim:#4a3313;
  --vanilla:#9fb0c9;       /* vanilla (slate silver) */
  --vanilla-dim:#2a3242;
  --uhc:#aecf3a;           /* uhc (lime) */
  --uhc-dim:#333f10;
  --axe:#ee5a52;           /* axe (red) */
  --axe-dim:#4a1f1c;
  --packs:#ff5ecb;         /* mods & texture packs (fuchsia) */
  --packs-dim:#4d1840;

  --lv-beg:#3ddc84; --lv-int:#f2c14e; --lv-adv:#f26d6d;

  --radius:14px; --radius-sm:9px;
  --font-px:'Silkscreen',monospace;
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --shadow:0 8px 28px rgba(0,0,0,.45);
  --ease:cubic-bezier(.22,.61,.36,1);        /* smooth deceleration */
  --ease-soft:cubic-bezier(.4,0,.2,1);
}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:76px}
/* dark, on-brand scrollbar so it doesn't clash with the obsidian theme */
html{scrollbar-color:var(--line) var(--void);scrollbar-width:thin}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;border:3px solid var(--void)}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}
body{background:var(--void);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--emerald);outline-offset:2px;border-radius:4px}
::selection{background:var(--emerald-dim);color:#fff}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:18px;
  padding:12px 22px;background:rgba(10,13,18,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line-soft)}
.wordmark{font-family:var(--font-px);font-size:20px;letter-spacing:1px;display:flex;align-items:center;gap:10px;white-space:nowrap}
.wordmark .cube{width:16px;height:16px;background:linear-gradient(135deg,var(--nether) 0 49.9%,var(--diamond) 50.1% 100%);border-radius:3px;box-shadow:0 0 14px rgba(69,200,255,.35)}
.wordmark em{font-style:normal;color:var(--emerald)}
.topsearch{flex:1;max-width:520px;position:relative}
.topsearch input{width:100%;padding:9px 14px 9px 38px;border-radius:99px;border:1px solid var(--line);
  background:var(--deep);color:var(--text);font:500 14px var(--font-body);transition:border-color .15s}
.topsearch input::placeholder{color:var(--faint)}
.topsearch input:focus{border-color:var(--emerald);outline:none}
.topsearch svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--faint)}
.topnav{margin-left:auto;display:flex;gap:6px}
.topnav a{padding:8px 14px;border-radius:99px;font:600 13px var(--font-head);color:var(--dim);transition:.15s}
.topnav a:hover{color:var(--text);background:var(--raise)}
.topnav a.active{color:var(--void);background:var(--emerald)}

/* ---------- hero : the netherite/diamond faceoff ---------- */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--line-soft)}
.hero-inner{max-width:1200px;margin:0 auto;padding:64px 22px 54px;text-align:center;position:relative;z-index:2}
.hero-eyebrow{font-family:var(--font-px);font-size:11px;letter-spacing:3px;color:var(--emerald);text-transform:uppercase}
.hero h1{font-family:var(--font-head);font-weight:700;font-size:clamp(34px,5.4vw,62px);line-height:1.06;margin:14px 0 16px;letter-spacing:-.01em}
.hero h1 .neth{color:var(--nether)} .hero h1 .dia{color:var(--diamond)} .hero h1 .sword{color:var(--steel)}
.hero p{color:var(--dim);max-width:560px;margin:0 auto 30px;font-size:16px}
.hero-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;margin:0 auto}
.hero-split.hero-tri{grid-template-columns:1fr 1fr 1fr;max-width:920px}
.hero h1 .grad{background:linear-gradient(100deg,var(--nether),var(--diamond) 38%,var(--steel) 62%,var(--diasmp));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
/* Scalable mode grid — auto-fits any number of modes, wraps gracefully */
.modegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:12px;max-width:940px;margin:28px auto 0}
.modecard{position:relative;overflow:hidden;text-align:left;padding:14px 15px 12px;border-radius:var(--radius);
  border:1px solid var(--mcd);background:var(--deep);cursor:pointer;
  transition:transform .26s var(--ease),border-color .26s var(--ease),box-shadow .26s var(--ease);
  display:flex;flex-direction:column;gap:2px;min-height:116px}
.modecard:hover{transform:translateY(-4px);border-color:var(--mc);box-shadow:var(--shadow)}
.modecard .mc-edge{display:none}
.modecard .mc-eyebrow{font-family:var(--font-px);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mc);position:relative;z-index:2}
.modecard h3{font-family:var(--font-head);font-size:16.5px;margin:1px 0;position:relative;z-index:2}
.modecard .mc-blurb{font-size:12px;color:var(--dim);line-height:1.42;flex:1;position:relative;z-index:2}
.modecard .mc-count{font-family:var(--font-head);font-weight:700;font-size:12px;color:var(--mc);margin-top:7px;position:relative;z-index:2}
/* vibrant always-on glow, brighter on hover (the look from the original doors) */
.modecard::after{content:"";position:absolute;inset:auto -30% -62% -30%;height:118px;filter:blur(38px);opacity:.5;background:var(--mc);transition:opacity .24s;z-index:1}
.modecard:hover::after{opacity:.9}
/* per-mode accents: --mc bright, --mcd dim border */
.modecard.k-neth{--mc:var(--nether);--mcd:var(--nether-dim)}
.modecard.k-dia{--mc:var(--diamond);--mcd:var(--diamond-dim)}
.modecard.k-sword{--mc:var(--steel);--mcd:var(--steel-dim)}
.modecard.k-smp{--mc:var(--smp);--mcd:var(--smp-dim)}
.modecard.k-diasmp{--mc:var(--diasmp);--mcd:var(--diasmp-dim)}
.modecard.k-crystal{--mc:var(--crystal);--mcd:var(--crystal-dim)}
.modecard.k-mace{--mc:var(--mace);--mcd:var(--mace-dim)}
.modecard.k-vanilla{--mc:var(--vanilla);--mcd:var(--vanilla-dim)}
.modecard.k-uhc{--mc:var(--uhc);--mcd:var(--uhc-dim)}
.modecard.k-axe{--mc:var(--axe);--mcd:var(--axe-dim)}
.modecard.k-packs{--mc:var(--packs);--mcd:var(--packs-dim)}
.modecard.k-fund{--mc:var(--emerald);--mcd:var(--emerald-dim)}
.kitdoor{position:relative;padding:22px 22px 20px;border-radius:var(--radius);text-align:left;border:1px solid var(--line);
  background:var(--deep);overflow:hidden;transition:transform .3s var(--ease),border-color .3s var(--ease);cursor:pointer}
.kitdoor:hover{transform:translateY(-4px)}
.kitdoor .kd-eyebrow{font-family:var(--font-px);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.kitdoor h3{font-family:var(--font-head);font-size:21px;margin:6px 0 4px}
.kitdoor span{font-size:13px;color:var(--dim)}
.kitdoor::after{content:"";position:absolute;inset:auto -30% -60% -30%;height:120px;filter:blur(38px);opacity:.5;transition:opacity .18s}
.kitdoor:hover::after{opacity:.85}
.kitdoor.neth{border-color:var(--nether-dim)} .kitdoor.neth .kd-eyebrow{color:var(--nether)} .kitdoor.neth::after{background:var(--nether)}
.kitdoor.neth:hover{border-color:var(--nether)}
.kitdoor.dia{border-color:var(--diamond-dim)} .kitdoor.dia .kd-eyebrow{color:var(--diamond)} .kitdoor.dia::after{background:var(--diamond)}
.kitdoor.dia:hover{border-color:var(--diamond)}
.kitdoor.sword{border-color:var(--steel-dim)} .kitdoor.sword .kd-eyebrow{color:var(--steel)} .kitdoor.sword::after{background:var(--steel)}
.kitdoor.sword:hover{border-color:var(--steel)}
.kitdoor.smp{border-color:var(--smp-dim)} .kitdoor.smp .kd-eyebrow{color:var(--smp)} .kitdoor.smp::after{background:var(--smp)}
.kitdoor.smp:hover{border-color:var(--smp)}
.kitdoor.diasmp{border-color:var(--diasmp-dim)} .kitdoor.diasmp .kd-eyebrow{color:var(--diasmp)} .kitdoor.diasmp::after{background:var(--diasmp)}
.kitdoor.diasmp:hover{border-color:var(--diasmp)}
.hero-bg{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(600px 340px at 18% -10%, rgba(201,161,132,.10), transparent 65%),
    radial-gradient(600px 340px at 82% -10%, rgba(69,200,255,.10), transparent 65%)}

/* ---------- layout ---------- */
.shell{max-width:1200px;margin:0 auto;padding:26px 22px 90px;animation:fade .4s var(--ease-soft) both}
.section-head{display:flex;align-items:baseline;gap:12px;margin:34px 0 16px;animation:slidein .45s var(--ease) both}
.section-head h2{font-family:var(--font-head);font-size:22px;font-weight:700}
.section-head .count{font-family:var(--font-px);font-size:11px;color:var(--faint)}
.section-head .bar{flex:1;height:1px;background:var(--line-soft)}
.section-head.neth h2{color:var(--nether)} .section-head.dia h2{color:var(--diamond)}

/* ---------- filter rail ---------- */
.filters{display:flex;flex-direction:column;gap:12px;padding:18px;border:1px solid var(--line-soft);
  border-radius:var(--radius);background:var(--deep);margin-top:24px}
.fgroup{display:flex;flex-wrap:wrap;align-items:center;gap:7px}
.fgroup .flabel{font-family:var(--font-px);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);min-width:78px}
.chip{padding:6px 13px;border-radius:99px;border:1px solid var(--line);background:transparent;
  font:600 12.5px var(--font-head);color:var(--dim);transition:all .2s var(--ease);user-select:none}
.chip:hover{border-color:var(--dim);color:var(--text)}
.chip.on{background:var(--emerald);border-color:var(--emerald);color:var(--void)}
.chip.on.k-neth{background:var(--nether);border-color:var(--nether)}
.chip.on.k-dia{background:var(--diamond);border-color:var(--diamond)}
.chip.on.k-sword{background:var(--steel);border-color:var(--steel)}
.chip.on.k-smp{background:var(--smp);border-color:var(--smp)}
.chip.on.k-diasmp{background:var(--diasmp);border-color:var(--diasmp);color:var(--void)}
.chip.on.k-crystal{background:var(--crystal);border-color:var(--crystal);color:var(--void)}
.chip.on.k-mace{background:var(--mace);border-color:var(--mace);color:var(--void)}
.chip.on.k-vanilla{background:var(--vanilla);border-color:var(--vanilla);color:var(--void)}
.chip.on.k-uhc{background:var(--uhc);border-color:var(--uhc);color:var(--void)}
.chip.on.k-axe{background:var(--axe);border-color:var(--axe);color:var(--void)}
.chip.on.k-packs{background:var(--packs);border-color:var(--packs);color:var(--void)}
.chip.more{border-style:dashed;color:var(--faint)}
.factive{display:flex;flex-wrap:wrap;gap:7px;align-items:center;border-top:1px solid var(--line-soft);padding-top:12px}
.factive:empty{display:none}
.factive .clear{font:600 12px var(--font-head);color:var(--emerald)}
.topicdrawer{display:none;flex-wrap:wrap;gap:16px;border-top:1px solid var(--line-soft);padding-top:12px}
.topicdrawer.open{display:flex}
.tcol{min-width:150px}
.tcol h5{font-family:var(--font-px);font-size:9.5px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:7px}
.tcol .chip{display:inline-block;margin:0 5px 6px 0;font-size:12px;padding:4px 11px}

/* ---------- video grid & card ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}
.grid .card:nth-child(1){animation-delay:.02s}
.grid .card:nth-child(2){animation-delay:.05s}
.grid .card:nth-child(3){animation-delay:.08s}
.grid .card:nth-child(4){animation-delay:.11s}
.grid .card:nth-child(5){animation-delay:.14s}
.grid .card:nth-child(6){animation-delay:.17s}
.grid .card:nth-child(7){animation-delay:.20s}
.grid .card:nth-child(8){animation-delay:.23s}
.grid .card:nth-child(9){animation-delay:.26s}
.grid .card:nth-child(10){animation-delay:.29s}
.grid .card:nth-child(11){animation-delay:.31s}
.grid .card:nth-child(12){animation-delay:.33s}
.grid .card:nth-child(n+13){animation-delay:.35s}
.card{background:var(--deep);border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;transition:transform .28s var(--ease),border-color .28s var(--ease),box-shadow .28s var(--ease);position:relative;
  animation:rise .55s var(--ease) both}
.card:hover{transform:translateY(-5px);border-color:var(--line);box-shadow:var(--shadow)}
.card:active{transform:translateY(-2px)}
.card .edge{height:3px}
.card.k-neth .edge{background:var(--nether)} .card.k-dia .edge{background:var(--diamond)} .card.k-sword .edge{background:var(--steel)} .card.k-smp .edge{background:var(--smp)} .card.k-diasmp .edge{background:var(--diasmp)} .card.k-crystal .edge{background:var(--crystal)} .card.k-mace .edge{background:var(--mace)} .card.k-vanilla .edge{background:var(--vanilla)} .card.k-uhc .edge{background:var(--uhc)} .card.k-axe .edge{background:var(--axe)} .card.k-packs .edge{background:var(--packs)} .card.k-fund .edge{background:var(--emerald)}
.card.k-both .edge{background:linear-gradient(90deg,var(--nether),var(--diamond))}
.thumbwrap{position:relative;aspect-ratio:16/9;background:var(--raise);display:block}
.thumbwrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.card:hover .thumbwrap img{transform:scale(1.05)}
.thumbwrap .dur{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.78);font:600 11px var(--font-head);
  padding:2px 7px;border-radius:5px}
.thumbwrap .play{position:absolute;inset:0;display:grid;place-items:center;opacity:0;transition:opacity .18s;background:rgba(6,8,11,.35)}
.card:hover .thumbwrap .play{opacity:1}
.thumbwrap .play span{width:46px;height:46px;border-radius:50%;background:var(--emerald);display:grid;place-items:center;box-shadow:0 4px 18px rgba(61,220,132,.45)}
.thumbwrap .play svg{width:17px;height:17px;fill:var(--void);margin-left:2px}
.cbody{padding:13px 15px 15px;display:flex;flex-direction:column;gap:8px;flex:1}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font:700 10px var(--font-head);letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.badge.k-neth{color:var(--nether);background:var(--nether-dim)}
.badge.k-dia{color:var(--diamond);background:var(--diamond-dim)}
.badge.k-sword{color:var(--steel);background:var(--steel-dim)}
.badge.k-smp{color:var(--smp);background:var(--smp-dim)}
.badge.k-diasmp{color:var(--diasmp);background:var(--diasmp-dim)}
.badge.k-crystal{color:var(--crystal);background:var(--crystal-dim)}
.badge.k-mace{color:var(--mace);background:var(--mace-dim)}
.badge.k-vanilla{color:var(--vanilla);background:var(--vanilla-dim)}
.badge.k-uhc{color:var(--uhc);background:var(--uhc-dim)}
.badge.k-axe{color:var(--axe);background:var(--axe-dim)}
.badge.k-packs{color:var(--packs);background:var(--packs-dim)}
.badge.k-fund{color:var(--emerald);background:var(--emerald-dim)}
.badge.ver-mod{color:#7fd0ff;background:#0d2f3f}
.badge.ver-old{color:#f2b24e;background:#3d2c12}
.chip.on.v-mod{background:#45c8ff;border-color:#45c8ff;color:var(--void)}
.chip.on.v-old{background:#f2b24e;border-color:#f2b24e;color:var(--void)}
.badge.k-both{color:var(--emerald);background:var(--emerald-dim)}
.badge.beginner{color:var(--lv-beg);background:rgba(61,220,132,.12)}
.badge.intermediate{color:var(--lv-int);background:rgba(242,193,78,.12)}
.badge.advanced{color:var(--lv-adv);background:rgba(242,109,109,.12)}
.ctitle{font:600 15px/1.35 var(--font-head);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctitle a::after{content:"";position:absolute;inset:0}  /* whole-card link to detail */
.cmeta{font-size:12.5px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap}
.cmeta .creator{color:var(--text);font-weight:500}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
.ctags i{font:500 11px var(--font-body);font-style:normal;color:var(--faint);border:1px solid var(--line-soft);
  padding:2px 8px;border-radius:99px}
.card .ytquick{position:absolute;top:10px;right:10px;z-index:3;opacity:0;transition:.15s;
  background:rgba(0,0,0,.72);border:1px solid var(--line);border-radius:8px;padding:5px 9px;
  font:600 11px var(--font-head);color:var(--text)}
.card:hover .ytquick{opacity:1}
.card .ytquick:hover{background:var(--emerald);color:var(--void);border-color:var(--emerald)}
.empty{padding:70px 20px;text-align:center;color:var(--dim);border:1px dashed var(--line);border-radius:var(--radius)}
.empty b{display:block;font-family:var(--font-head);font-size:17px;color:var(--text);margin-bottom:6px}

/* ---------- video detail page ---------- */
.detail{max-width:980px;margin:0 auto;padding:34px 22px 90px}
.crumb{font:600 13px var(--font-head);color:var(--dim);display:inline-flex;gap:8px;align-items:center;margin-bottom:22px}
.crumb:hover{color:var(--emerald)}
/* inline player */
.dstage{margin-bottom:22px}
.dbar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dbar-label{font-family:var(--font-px);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}

.dplayer img{width:100%;height:100%;object-fit:cover;display:block}
.dplayer .dplay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(6,8,11,.30);transition:.15s}

.dplayer .dplay svg{width:30px;height:30px;fill:#fff;margin-left:4px}

.dinfo.wide{max-width:820px}
.dgrid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:30px;align-items:start}
.dthumb{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);display:block}
.dthumb img{width:100%;aspect-ratio:16/9;object-fit:cover}

<script>
/* ================================================================
   POTLAB — single-file SPA
   modules: DATA · STORE · SEARCH/FILTER · RENDER · ROUTER · ADMIN
   Video schema:
   { id, title, creator, url?, desc, level, kit, format,
     topics:[], tags:[], date:'YYYY-MM-DD'|null, duration:'M:SS'|null,
     hydrate?:true  // fetch title/creator from YouTube oEmbed at runtime
   }
   Thumbnails derive from the video id — no need to store them.
   ================================================================ */

/* ----------------------------- DATA ---------------------------- */
const TOPIC_GROUPS = {
  "Beginner":  ["Basic PvP","Hotkeys","Inventory setup","Sensitivity","Crosshair placement","Movement basics"],
  "Aim":       ["Tracking","Flicks","CPS","Click timing","Hit consistency"],
  "Movement":  ["Strafing","W-tapping","Sprint resets","Positioning","Spacing"],
  "Potting":   ["Fast potting","Pot accuracy","Refill speed","Inventory management","Potion timing"],
  "Combat":    ["Comboing","Crit timing","Trade management","Pressure","Recovery"],
  "Advanced":  ["Prediction","Mind games","High-level techniques","Tournament strategy","Ranked gameplay","Professional VOD reviews"],
  "Practice":  ["Drills","Exercises","Warmups","Aim training","Improvement routines"],
  "General":   ["General"]
};
/* ---- MODES ----------------------------------------------------
   Each video belongs to one or more modes. A video in every mode is
   "Universal" (shared fundamentals like w-tapping or aim). Pot-only
   videos (potting, potion timing) belong to neth+dia but NOT sword.
   To add a future mode: add it to MODES + MODE_ORDER + MODE_HEX and
   the whole UI (filters, sections, doors, badges) picks it up. */
const MODES = { neth:"Netherite Pot", dia:"Diamond Pot", sword:"Sword", smp:"SMP", diasmp:"Diamond SMP", crystal:"Crystal", mace:"Mace", vanilla:"Vanilla", uhc:"UHC", axe:"Axe", packs:"Mods & Packs", fund:"Fundamentals" };
const MODE_ORDER = ["neth","dia","sword","smp","diasmp","crystal","mace","vanilla","uhc","axe","packs","fund"];
const ALL_MODES = MODE_ORDER.slice();
/* Per-mode display metadata — the hero mode grid renders straight from this,
   so adding a future mode is just one more MODES + MODE_ORDER + MODE_META entry. */
const MODE_META = {
  neth:    { icon:"■", blurb:"Crit chains, armor pressure &amp; pot management" },
  dia:     { icon:"◆", blurb:"Combos, knockback control &amp; fast potting" },
  sword:   { icon:"⚔", blurb:"Pure combos &amp; spacing — no potions at all" },
  smp:     { icon:"⬢", blurb:"Netherite gear, shields, totems &amp; pearls" },
  diasmp:  { icon:"❖", blurb:"Diamond-gear survival PvP with shields" },
  crystal: { icon:"✵", blurb:"End crystals &amp; anchors — explosive burst combat" },
  mace:    { icon:"⬗", blurb:"Wind-charge mace smashes &amp; breach hits" },
  vanilla: { icon:"◇", blurb:"The all-kit fusion — crystals, mace &amp; gear together" },
  uhc:     { icon:"♁", blurb:"No natural regen — resource &amp; utility survival" },
  axe:     { icon:"⛏", blurb:"Shield disabling &amp; heavy single-hit punishes" },
  packs:   { icon:"✜", blurb:"Texture packs, clients &amp; mods — crosshairs, FPS &amp; visuals" },
  fund:    { icon:"✦", blurb:"Cross-mode basics: aim, movement, clicking &amp; guides" },
};
// Back-compat alias so older references keep working
const KITS = { ...MODES, both:"Universal" };
const LEVELS  = ["beginner","intermediate","advanced"];
const FORMATS = ["Tutorial","Gameplay","Commentary","Shorts","General"];

const primaryMode = v => v.modes[0] || "fund";
const modeLabel = v => MODES[v.modes[0]] || "Fundamentals";

/* Seed library — every id below is a real YouTube video found while
   researching this build. Entries with hydrate:true refresh their
   title/creator from YouTube's oEmbed data on load. */
const SEED_VIDEOS = [
  { id:"RXqotHQ9xLg", title:"Everything You Need to Know About Netherite PotPvP!", creator:"Rickafam",
    desc:"The community-standard concept guide — recommended by the PvP Legacy wiki itself. Covers nearly every core idea in netherite pot in one video.",
    level:"intermediate", kit:"neth", format:"Tutorial",
    topics:["General"], tags:["nethpot","guide","pvp legacy","fundamentals"], date:"2023-02-11", duration:null },

  { id:"aRAz2yYF4Z0", title:"Netherite Pot PvP Tutorial", creator:"Deivii_17", hydrate:true,

/* ---------------------------- STORE ---------------------------- */
/* deriveModes — STRICT single-mode assignment. Every video belongs to
   exactly one mode. A video may carry an explicit `modes` array (new videos
   do); otherwise it's derived from the legacy `kit` field:
   - kit neth/dia/sword/smp/diasmp → that mode only
   - legacy "both" (cross-mode basics: aim, movement, clicking, general
     guides, tier-testing) → Fundamentals, so it NEVER shows under a combat mode.
   Selecting a mode shows only videos that are specifically about that mode. */
function deriveModes(v){
  if(Array.isArray(v.modes) && v.modes.length) return [v.modes[0]];   // force single, explicit wins
  const kit = v.kit;
  if(MODES[kit]) return [kit];        // neth/dia/sword/smp/diasmp/fund
  return ["fund"];                    // legacy "both" and anything unrecognised
}

/* base videos = the built-in seed list, plus anything this browser
   added before Firestore existed (kept as a harmless fallback). The
   shared, everyone-sees-them videos are merged in by loadRemoteVideos(). */
function baseVideos(){
  const base = SEED_VIDEOS.map(v => ({...v}));
  try{
    const saved = JSON.parse(localStorage.getItem("potlab_custom") || "[]");
    for(const v of saved) if(!base.some(x => x.id === v.id)) base.push(v);
  }catch(e){}
  return base;
}

const store = {
  videos: [],
  query: "",
  filters: { kit:new Set(), ver:new Set(), level:new Set(), format:new Set(), topic:new Set() },
  user: null,      // Firebase user object when signed in, else null
  isAdmin: false,  // true when signed-in user's email is whitelisted
  removedIds: new Set(),
  remoteVideoIds: new Set(),   // ids that live in the shared Firestore library
  finalize(){
    this.videos.forEach(v => { v.modes = deriveModes(v); v.ver = v.ver || "1.9"; });
  },
  load(){                       // instant render from seed while Firestore loads
    this.videos = baseVideos();
    this.finalize();
  },
  byId(id){ return this.videos.find(v => v.id === id); }
};

/* Merge the shared Firestore library over the seed list. Docs flagged
   {removed:true} act as tombstones so an admin can hide ANY video
   (seed or added) for everyone. */
async function loadRemoteVideos(){
  if(!window.potDB) return;
  let docs;
  try{ docs = await window.potDB.loadVideos(); }
  catch(e){ return; }
  const removed = new Set();
  const map = new Map(baseVideos().map(v => [v.id, v]));
  const remoteIds = new Set();
  for(const d of docs){
    if(d.removed){ removed.add(d.id); }
    else { map.set(d.id, d); remoteIds.add(d.id); }
  }
  for(const id of removed){ map.delete(id); remoteIds.delete(id); }
  store.removedIds = removed;
  store.remoteVideoIds = remoteIds;
  store.videos = [...map.values()];
  store.finalize();
  route();
  hydrate();
}

/* ------------------------- helpers ----------------------------- */
const $  = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const THUMB_SOURCES = id => [
  `https://i.ytimg.com/vi/${id}/hqdefault.jpg`,
  `https://img.youtube.com/vi/${id}/hqdefault.jpg`,
  `https://i.ytimg.com/vi_webp/${id}/hqdefault.webp`,
  `https://i.ytimg.com/vi/${id}/mqdefault.jpg`,
  `https://img.youtube.com/vi/${id}/0.jpg`
];
const thumb = id => THUMB_SOURCES(id)[0];
/* If every YouTube host is unreachable (offline / sandboxed preview),
   draw a kit-colored placeholder so the card never looks broken. */
const KIT_HEX = { neth:["#4a3527","#c9a184"], dia:["#0d2f3f","#45c8ff"], sword:["#2e2350","#b18cf0"], smp:["#123f3f","#2ec9c9"], diasmp:["#42203a","#e87ac0"], crystal:["#2b1a4d","#a05cff"], mace:["#4a3313","#f0a838"], vanilla:["#2a3242","#9fb0c9"], uhc:["#333f10","#aecf3a"], axe:["#4a1f1c","#ee5a52"], fund:["#123528","#3ddc84"], both:["#123528","#3ddc84"] };
function phThumb(kit, label){
  const [bg, fg] = KIT_HEX[kit] || KIT_HEX.both;
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'>
    <rect width='320' height='180' fill='${bg}'/>
    <rect x='10' y='10' width='300' height='160' fill='none' stroke='${fg}' stroke-opacity='.35' stroke-width='2'/>
    <circle cx='160' cy='78' r='26' fill='${fg}'/>
    <path d='M152 64l24 14-24 14z' fill='${bg}'/>
    <text x='160' y='140' text-anchor='middle' font-family='monospace' font-size='15' fill='${fg}'>${label}</text>
  </svg>`;
  return "data:image/svg+xml," + encodeURIComponent(svg);
}
/* onerror walker: step through sources, then placeholder, then stop */
let thumbFails = 0;
window.thumbFail = function(img){
  const alts = THUMB_SOURCES(img.dataset.vid);
  const i = Number(img.dataset.try || 0) + 1;
  img.dataset.try = i;
  if(i < alts.length){ img.src = alts[i]; }
  else {
    img.onerror = null;
    img.src = phThumb(img.dataset.kit, img.dataset.kitlabel);
    if(++thumbFails === 5) showPreviewNotice();   // every host blocked → sandboxed preview
  }
};
function showPreviewNotice(){
  if(document.getElementById("pvnotice")) return;
  const n = document.createElement("div");
  n.id = "pvnotice";
  n.innerHTML = `<b>Preview mode:</b> this sandbox blocks images from YouTube, so placeholder art is shown.
    Download the file and open it in your browser (or host it) and the real video thumbnails will load.
    <button aria-label="Dismiss" onclick="this.parentNode.remove()">✕</button>`;
  document.body.prepend(n);
}
function thumbImg(v, lazy=true){
  return `<img ${lazy ? 'loading="lazy"' : ""} decoding="async" src="${thumb(v.id)}" alt="Thumbnail: ${esc(v.title)}"
    referrerpolicy="no-referrer" data-vid="${esc(v.id)}" data-kit="${primaryMode(v)}" data-kitlabel="${esc(modeLabel(v))}"
    onerror="thumbFail(this)">`;
}
const ytUrl = v => v.url || `https://www.youtube.com/watch?v=${v.id}`;
const fmtDate = d => {
  if(!d) return "";
  const dt = new Date(d + "T00:00:00");
  return isNaN(dt) ? "" : dt.toLocaleDateString("en-GB",{year:"numeric",month:"short",day:"numeric"});
};
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

/* --------------------- oEmbed hydration ------------------------
   Titles/creators refresh from YouTube's oEmbed data (via noembed,
   which adds CORS). Fails silently offline — seed data still shows. */
async function hydrate(){
  const targets = store.videos.filter(v => v.hydrate);
  await Promise.allSettled(targets.map(async v => {
    try{
      const r = await fetch(`https://noembed.com/embed?url=${encodeURIComponent("https://www.youtube.com/watch?v=" + v.id)}`);
      const j = await r.json();
      if(j.title)       v.title   = j.title;
      if(j.author_name) v.creator = j.author_name;
      v.hydrate = false;
    }catch(e){ /* keep seed values */ }
  }));
  if(currentRoute === "" || currentRoute === "#/" || currentRoute.startsWith("#/video/")) route();
}

/* --------------------- search + filtering ---------------------- */
function matches(v){
  const f = store.filters;
  // Mode filter: strict — a video shows only if its (single) mode is selected.
  if(f.kit.size && !f.kit.has(v.modes[0])) return false;
  if(f.ver.size && !f.ver.has(v.ver)) return false;
  if(f.level.size  && !f.level.has(v.level)) return false;
  if(f.format.size && !f.format.has(v.format)) return false;
  if(f.topic.size  && ![...f.topic].some(t => v.topics.includes(t))) return false;
  if(store.query){
    const hay = [v.title, v.creator, v.desc, v.topics.join(" "), v.tags.join(" "), modeLabel(v)].join(" ").toLowerCase();
    for(const term of store.query.toLowerCase().split(/\s+/).filter(Boolean)){
      if(!hay.includes(term)) return false;
    }
  }
  return true;
}
const filtered = () => store.videos.filter(matches)
  .sort((a,b) => (b.date || "0000").localeCompare(a.date || "0000"));

/* --------------------------- RENDER ---------------------------- */
function modeBadges(v){
  const m = v.modes[0];
  return `<span class="badge k-${m}">${MODES[m]}</span>`;
}
function cardHTML(v){
  return `
  <article class="card k-${primaryMode(v)}">
    <div class="edge"></div>
    <a class="thumbwrap" href="${esc(ytUrl(v))}" target="_blank" rel="noopener" aria-label="Watch ${esc(v.title)} on YouTube">
      ${thumbImg(v)}
      ${v.duration ? `<span class="dur">${esc(v.duration)}</span>` : ""}
      <span class="play"><span><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></span>
    </a>
    <div class="cbody">
      <div class="badges">
        ${modeBadges(v)}
        <span class="badge ver-${v.ver === "1.8" ? "old" : "mod"}">${v.ver === "1.8" ? "1.8" : "1.9+"}</span>
        <span class="badge ${v.level}">${cap(v.level)}</span>
      </div>
      <h3 class="ctitle"><a href="#/video/${esc(v.id)}">${esc(v.title)}</a></h3>
      <div class="cmeta">
        ${v.creator ? `<span class="creator">${esc(v.creator)}</span>` : ""}
        ${v.date ? `<span>${fmtDate(v.date)}</span>` : ""}
        <span>${esc(v.format)}</span>
      </div>
      <div class="ctags">${v.topics.slice(0,3).map(t => `<i>${esc(t)}</i>`).join("")}</div>
    </div>
    <a class="ytquick" href="${esc(ytUrl(v))}" target="_blank" rel="noopener">YouTube ↗</a>
  </article>`;
}

function chip(group, val, label, extra=""){
  const on = store.filters[group].has(val);
  return `<button class="chip ${on ? "on" : ""} ${extra}" data-fg="${group}" data-fv="${esc(val)}"
           aria-pressed="${on}">${esc(label)}</button>`;
}

function filtersHTML(){
  const f = store.filters;
  const active = [];
  for(const g of ["kit","ver","level","format","topic"])
    for(const v of f[g]) active.push({g, v, label: g === "kit" ? (v === "both" ? "Universal" : MODES[v]) : g === "ver" ? (v === "1.8" ? "1.8 PvP" : "1.9+ PvP") : cap(v)});
  return `
  <section class="filters" aria-label="Filters">
    <div class="fgroup"><span class="flabel">Combat</span>
      ${chip("ver","1.9","1.9+ PvP","v-mod")}
      ${chip("ver","1.8","1.8 PvP","v-old")}
    </div>
    <div class="fgroup"><span class="flabel">Mode</span>
      ${MODE_ORDER.map(m => chip("kit", m, MODES[m], "k-"+m)).join("")}
    </div>
    <div class="fgroup"><span class="flabel">Level</span>
      ${LEVELS.map(l => chip("level", l, cap(l))).join("")}
    </div>
    <div class="fgroup"><span class="flabel">Format</span>
      ${FORMATS.map(x => chip("format", x, x)).join("")}
      <button class="chip more" id="topictoggle" aria-expanded="false">+ Training topics</button>
    </div>
    <div class="topicdrawer" id="topicdrawer">
      ${Object.entries(TOPIC_GROUPS).map(([g, ts]) => `
        <div class="tcol"><h5>${esc(g)}</h5>${ts.map(t => chip("topic", t, t)).join("")}</div>`).join("")}
    </div>
    <div class="factive">
      ${active.map(a => chip(a.g, a.v, "✕ " + a.label)).join("")}
      ${active.length ? `<button class="clear" id="clearfilters">Clear all</button>` : ""}
    </div>
  </section>`;
}

/* Home layout: tutorials grouped into one section per training aspect.
   A video appears in every aspect section its topics belong to;
   all-round guides live in "General Guides"; gameplay/montages sit
   in their own section at the bottom so tutorials stay the focus. */
const ASPECT_ORDER = [
  ["General",  "General Guides",          "▣", "all-in-one tutorials that cover the whole mode"],
  ["Beginner", "Basics & Setup",          "⧉", "first steps, hotkeys, inventory setup, sensitivity"],

function related(v){
  const overlap = (a, b) => a.modes.filter(m => b.modes.includes(m)).length;
  return store.videos
    .filter(x => x.id !== v.id)
    .map(x => ({x, score:
      overlap(x, v) * 2 +
      x.topics.filter(t => v.topics.includes(t)).length * 2 +
      (x.level === v.level ? 1 : 0)}))
    .sort((a,b) => b.score - a.score)
    .slice(0,4).map(r => r.x);
}

/* click-to-play: swap the thumbnail for YouTube's real player.
   autoplay works because it follows a user click; sound is allowed.
   Uses the standard youtube.com/embed so a viewer's own YouTube
   Premium (if they're signed in on this browser) plays ad-free. */
function playInline(p){
  if(!p || p.dataset.playing) return;
  const id = p.dataset.vid;
  if(store.user) HISTORY.logClick(id);        // watching = strong interest signal
  p.dataset.playing = "1";
  const src = "https://www.youtube.com/embed/" + encodeURIComponent(id) +
              "?autoplay=1&rel=0&modestbranding=1&playsinline=1";
  p.innerHTML = `<iframe src="${src}" title="YouTube video player"
    allow="autoplay; encrypted-media; picture-in-picture; web-share; fullscreen"
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
}

  /* ===================== UHC ===================== */
  const UHC_SECTIONS = [
  ["g-overview","Overview","▣", `
    <p><b>UHC</b> (Ultra Hardcore) is defined by one rule: <b>natural regeneration is off</b>. You don't heal by keeping your hunger up — the only healing is a limited supply of golden apples (and sometimes golden heads). That single change makes UHC a mode about <b>resource management and survival</b> above all: every heart you lose is (mostly) permanent, so the player who protects their health and out-lasts the other on resources wins.</p>
    <p>The kit is diamond gear with a sword and axe, plus <b>utilities</b> — cobwebs, lava and water buckets, a bow, blocks and gapples. It's a slower, more calculating mode than the pot kits: you're not grinding a health race you can heal back, you're managing a bar that only goes down.</p>
    <div class="kitnote uhc"><b>UHC in one line:</b> you can't heal it back, so win by taking less than they do and out-lasting their resources.</div>`],

  ["g-setup","The kit & utilities","⧉", `
    <p>Standard UHC loadout: diamond armor, a <b>sword and axe</b>, <b>golden apples</b> (your only heal — ration them), a bow with limited arrows, and the utility items that make the mode: <b>cobwebs</b>, <b>lava and water buckets</b>, and <b>blocks</b>.</p>
    <ul>

  ["g-resource","Resource management — the #1 skill","♁", `
    <p>Because health doesn't come back on its own, <b>UHC is won on resources, not on hearts alone</b>. A fight you're "losing" on health can still be winning if they've burned more gapples and utilities than you.</p>

      <li><b>Don't over-commit.</b> Taking a big chunk of damage for one kill attempt can lose you the whole game — there's no potting it back.</li>
      <li><b>Gapple with a purpose</b> — to survive a specific burst or reset a losing exchange, never as a panic reflex, and ideally where they can't punish the eat.</li>
      <li><b>Count their gapples.</b> Force them to heal, track how many they've used, and press when they're dry.</li>

    </ul>`],

  ["g-utilities","Utilities: cobweb, lava & water","◒", `
    <p>The utility items are what separate UHC from a plain diamond fight — they let you <b>create heal windows and deny combos</b> when you can't just splash a pot.</p>

      <li><b>Water bucket:</b> cancels lava, removes fall damage, resets fire, and can wash opponents out of position.</li>

    </ul>`],

  ["g-bow","The bow & ranged game","➶", `
    <p>With limited healing, <b>chip damage matters more in UHC than anywhere else</b> — a few bow hits that never heal back are real progress. Use the bow to soften opponents before you commit to melee, and to <b>finish runners</b> who try to disengage on low health.</p>
    <p>Arrows are limited, so every shot should count — snipe from range, or use the bow to interrupt their gapple. Good aim with the bow quietly wins UHC games by turning "they got away" into a kill.</p>`],

  ["g-combat","Combat & kiting","✕", `
    <p>UHC melee is diamond-tier crits and w-taps, but played <b>patiently</b>: you're not trying to out-heal them, you're trying to take a favourable trade and disengage. <b>Kiting</b> — hitting and backing off with your utilities and terrain — is the core combat rhythm.</p>
    <ul>
      <li><b>Take trades where you deal more than you take</b>, then reset with a web or lava.</li>
      <li><b>Use terrain</b> — fight uphill, near your lava, or where your cobwebs are, not in the open.</li>
      <li><b>Punish their heals:</b> when they eat a gapple, that's your free-damage window.</li>
    </ul>`],

  ["g-advanced","Advanced tricks","★", `
    <p>The tricks that win high-tier UHC all come back to one idea: buying a safe moment when the mode gives you no free healing. These are the plays you'll see top players lean on when a fight gets tight:</p>
    <ul>

      <li><b>Lava draining / trapping:</b> cut off their escape and force chip with lava, then reclaim the ground with water once you've made them pay.</li>
      <li><b>Block clutches:</b> wall yourself off to buy the gapple window you couldn't get in the open.</li>

    <ul>
      <li><b>Fighting like it's pot</b> — trading health you can never heal back.</li>
      <li><b>Panic-gappling</b> and running dry early.</li>
      <li><b>Wasting utilities</b> — cobwebs and buckets thrown out with no plan.</li>
      <li><b>Ignoring the bow</b> and letting low opponents escape.</li>
      <li><b>Over-committing to a kill</b> and losing the resource war even if you win the fight.</li>

  ["g-practice","Practice","↻", `
    <div class="drill"><b>Utility drill · 10 min</b><br>Rehearse cobweb-stun, lava place-and-pickup, and water clutches until they're instant under pressure.</div>
    <div class="drill"><b>Resource discipline · real fights</b><br>Play UHC duels where your only goal is to end the fight with more gapples left than your opponent used.</div>
    <div class="drill"><b>Bow drill · 10 min</b><br>Practice chipping and finishing a moving target so no low-health opponent escapes you.</div>
    <p class="gvideos">Watch instead? <a href="#/">The UHC videos →</a></p>`],
  ];

  /* ===================== AXE ===================== */
  const AXE_SECTIONS = [
  ["g-overview","Overview","▣", `
    <p><b>Axe</b> PvP is built around one weapon interaction: the <b>axe disables shields</b>. It's a slower, more predatory mode than sword — the axe hits hard but has a <b>long attack cooldown</b>, so you can't spam it. Instead, fights become a game of <b>patience, shield-breaking and punishing</b>: bait or force their shield down, land a heavy hit in the opening, and don't waste your slow swings.</p>
    <p>Popularised by Dream's manhunts, axe & shield is deceptively deep — the pace hides the danger, and one well-timed commitment can swing a whole duel. Some variants add food; the pure tier kit is mostly about the axe-and-shield exchange itself.</p>
    <div class="kitnote axe"><b>Axe in one line:</b> respect the cooldown, break their shield, and make every slow, heavy hit count.</div>`],

  ["g-setup","Kit & the cooldown","⧉", `
    <p>The axe kit is simple — a <b>Sharpness axe</b>, a <b>shield</b> offhand, sometimes a sword and food — but the axe's <b>attack cooldown</b> is the whole mechanic. A fully-charged axe hit is huge; a spammed, half-charged one is weak <i>and</i> leaves you exposed. You must wait roughly <b>1.25 seconds</b> between hits for full damage.</p>
    <ul>
      <li><b>Never spam the axe</b> — a whiffed or uncharged swing is a long, punishable gap.</li>

      <li>Watch the cooldown indicator until the timing is second nature.</li>
    </ul>`],

  ["g-shield","Shield disabling — the core","⛨", `

      <li><b>The cooldown trick ("swing as you switch"):</b> the key axe technique — click at the exact moment you'd hit, so if they raise their shield you disable it, and if they don't you still land the axe. Low-risk pressure.</li>
      <li><b>Read their shield pattern</b> — most players raise on a rhythm; learn it and disable pre-emptively.</li>
      <li><b>Fake shields:</b> flash your own shield up and down to bait their disable, then punish the wasted axe cooldown.</li>

  ["g-cooldown","The cooldown game","◎", `

    <ul>
      <li><b>Bait the swing:</b> stay just out of range so they axe-whiff, then step in and punish the ~1.25s recovery with your own charged hit.</li>
      <li><b>Crit-axe:</b> a jump-crit with the axe adds burst — worth the risk when you've earned a clean opening.</li>
      <li><b>Don't double-swing</b> hopefully — one charged hit beats two weak ones, and the second uncharged swing is where you get punished.</li>
    </ul>`],

  ["g-movement","Movement & kiting","⇄", `

    <ul>
      <li><b>Hit and reposition</b> — land your charged hit, then back out of their range while your axe recharges.</li>

      <li><b>Use terrain</b> — force them to approach uphill or through a choke where their options shrink.</li>

  ["g-advanced","Advanced & reads","★", `

      <li><b>Fake-out disables:</b> feint a swing to make them drop or raise the shield at the wrong moment, then punish the mistake you just created.</li>
      <li><b>Cooldown counting:</b> track <i>their</i> axe too — the moment right after their swing, they've got nothing, and that's your free hit.</li>

    <ul>

      <li><b>Ignoring the shield</b> — not disabling theirs, or never using your own.</li>
      <li><b>Over-committing</b> instead of baiting their swing and punishing the whiff.</li>

    <div class="drill"><b>Bait drill · 10 min</b><br>Spar focusing only on baiting their swing and punishing the recovery with a charged hit.</div>

  /* ===================== 1.8 PvP (classic combat) ===================== */
  /* 1.8 is a fundamentally different combat system — no attack cooldown,
     so clicking speed and non-stop combos rule. Shown when the combat
     toggle is set to 1.8. It's one unified style, played as sword & pot. */
  const OLD_SECTIONS = [
  ["g-overview","Overview","▣", `
    <p><b>1.8 PvP</b> is the <b>classic combat system</b> from before the 1.9 update — and it plays nothing like modern PvP. The defining fact: there is <b>no attack cooldown</b>. Every click swings your sword at full damage, so <b>clicking speed matters</b>, hits come non-stop, and fights become fast, aggressive <b>combo</b> battles. There's no sweep attack, no dual-wielding, no shields, and no crystals or mace — just movement, clicking and knockback.</p>
    <p>It's still hugely popular on servers like Hypixel, played mainly as <b>1.8 Sword</b> and <b>1.8 Pot (combo potpvp)</b>. If you come from 1.9+, unlearn the "wait for the cooldown" instinct entirely — here, hesitation just means fewer hits.</p>
    <div class="kitnote ver-old"><b>1.8 in one line:</b> no cooldown means more clicks and longer combos win — reset your knockback and never stop hitting.</div>`],

  ["g-clicking","Clicking (CPS)","⌁", `
    <p>This is the single biggest difference from 1.9+. With no attack cooldown, <b>every extra click is extra damage</b>, so a higher, consistent <b>CPS (clicks per second)</b> directly wins fights — the opposite of 1.9+, where clicking past the cooldown does nothing.</p>
    <ul>
      <li><b>Jitter clicking:</b> tensing your arm/hand to vibrate the mouse button for ~10–14 CPS. The most common competitive method.</li>
      <li><b>Butterfly clicking:</b> alternating two fingers on one button for high bursts (20+ CPS) — banned on some servers, so check rules.</li>
      <li><b>Drag clicking:</b> dragging a finger across the button for a burst of clicks — situational.</li>
      <li><b>Consistency &gt; peak:</b> a steady 11–13 CPS you can aim with beats a spiky 20 you can't control.</li>
    </ul>`],

  ["g-wtap","W-tapping & sprint resets","⇄", `
    <p>W-tapping matters even more in 1.8 than in 1.9+, because it feeds the non-stop combo. Releasing and re-pressing <kbd>W</kbd> between hits resets your sprint so every hit lands <b>full knockback</b>, keeping the opponent flying and unable to retaliate.</p>
    <p>Combined with high CPS, clean w-taps are what let 1.8 players hold the long, relentless combos the era is famous for. <b>S-tapping</b> backward keeps your spacing as they get knocked away so the combo never breaks.</p>`],

  ["g-combo","Comboing","✕", `
    <p>1.8 is the <b>combo era</b>. With no cooldown, once you win a hit you can chain hits indefinitely as long as you keep knocking them back and following up — the fabled infinite combo. The whole game is <b>starting a combo and never letting it end</b>.</p>
    <ul>
      <li><b>Win the first hit</b> with a clean sprint-w-tap, then ride the knockback, hitting them the instant they're in range.</li>
      <li><b>Steer them into walls</b> to remove their knockback escape and lock the combo.</li>
      <li><b>High CPS during the combo</b> maximises hits landed before they touch ground and reset.</li>
    </ul>`],

  ["g-blockhit","Block-hitting","⛨", `
    <p>A 1.8-only mechanic: right-clicking with a sword <b>raises it to block</b>, <b>halving incoming damage</b> (there are no shields in 1.8 — the sword itself blocks). Skilled players <b>block-hit</b>: tapping right-click between left-click swings to reduce the damage they take <i>while</i> still attacking.</p>
    <p>Block-hitting during a combo you're losing, or while trading, quietly wins fights by cutting the damage you take in half. It was removed in 1.9, so it's pure 1.8 tech — and a key skill gap between good and average players.</p>`],

  ["g-crits","Crits & jumping","✵", `
    <p>Crits work here too: hitting while falling deals +50% damage. In 1.8 you weave <b>jump-crits</b> into combos — small hops timed so your hit lands on the way down — without the cooldown penalty that makes jumping costly in 1.9+.</p>
    <p>Because there's no cooldown, you can crit far more freely than in modern PvP, but don't jump so much that you lose the ground control that holds your combo. Balance crit bursts with grounded w-tap hits.</p>`],

  ["g-pot","1.8 Pot (combo potpvp)","◒", `
    <p>The pot variant of 1.8 combat combines everything above with <b>splash potions of healing</b>. It's faster and more aggressive than 1.9 pot: you hold combos with high CPS and w-taps, and <b>pot mid-fight</b> to out-heal the damage.</p>
    <ul>
      <li><b>Pot on the move</b>, thrown at your feet as you strafe — never stand still.</li>
      <li><b>Combo, then pot</b> — force damage with a combo, heal it back, and repeat; whoever combos harder and pots cleaner wins.</li>
      <li><b>Block-hit</b> while you're being combo'd to survive long enough to pot and reset.</li>
    </ul>`],

  ["g-diff","How it differs from 1.9+","◆", `
    <p>If you're used to modern PvP, here's what changes in 1.8:</p>
    <ul>
      <li><b>No attack cooldown</b> — spam and CPS matter; there's no "wait to recharge".</li>
      <li><b>No shields</b> — you block with the sword (block-hitting) instead.</li>
      <li><b>No sweep attack, no dual-wield, no crystals/mace/anchors.</b></li>
      <li><b>Combos are longer and faster</b> — the core skill, versus 1.9+'s spacing and cooldown reads.</li>
      <li><b>Clicking method is a real skill</b> (jitter/butterfly) rather than a minor factor.</li>
    </ul>`],

  ["g-practice","Practice","↻", `
    <div class="drill"><b>CPS drill · 10 min</b><br>Pick one clicking method (jitter is the safe default) and practice holding a steady, aimable 11–13 CPS — consistency over peak.</div>
    <div class="drill"><b>Combo drill · 10 min</b><br>W-tap + high-CPS combos on a friend, aiming to hold the longest unbroken chain you can.</div>
    <div class="drill"><b>Block-hit drill · 10 min</b><br>Practice weaving right-click blocks between hits until it's part of your rhythm.</div>
    <p class="gvideos">Watch instead? <a href="#/">Filter the library to 1.8 PvP →</a> for the clicking and combo tutorials.</p>`],
  ];

  const GUIDES = {
    neth: NETH_SECTIONS, dia: DIA_SECTIONS, sword: SWORD_SECTIONS,
    smp: SMP_SECTIONS, diasmp: DIASMP_SECTIONS,
    crystal: CRYSTAL_SECTIONS, mace: MACE_SECTIONS,
    vanilla: VANILLA_SECTIONS, uhc: UHC_SECTIONS, axe: AXE_SECTIONS,
  };
  const LEADS = {
    neth:   "The written Netherite Pot course — the crit-and-armor grind, buff uptime, the resource war and the crit-exchange mind game that decides high-tier fights.",
    dia:    "The written Diamond Pot course — w-tapping, holding combos, wall pressure and the fast, punishing tempo that separates diapot from nethpot.",
    sword:  "The written Sword course — no pots, pure combos and movement, winning the opening exchange and the recovery that <i>is</i> your health bar.",
    smp:    "The written SMP course — shields and axe disables, the two-sword game, totem and pearl management, and the playstyle reads that win survival fights.",
    diasmp: "The written Diamond SMP course — the SMP toolkit on diamond gear, where knockback returns, combos matter, and every mistake costs more.",
    crystal:"The written Crystal PvP course — placement, totem discipline, the crystal cycle and anchors. A different game from the melee modes, written for it specifically.",
    mace:   "The written Mace PvP course — the wind-charge smash loop, Breach and shield play, variants and reads. Built for the smash game, not the melee modes.",
    vanilla:"The written Vanilla course — the all-kit fusion of SMP, Crystal and Mace, where adaptability and hotbar mastery beat any single playstyle.",
    uhc:    "The written UHC course — no natural regen, so resource management, utilities (cobwebs, lava, water) and out-lasting your opponent are everything.",
    axe:    "The written Axe course — shield disabling, the cooldown game, and the patient baiting-and-punishing that defines the axe-and-shield kit.",
  };
  const isOld = store.guideVer === "1.8";
  const ACTIVE = isOld ? OLD_SECTIONS : (GUIDES[k] || NETH_SECTIONS);
  const headTitle = isOld ? "1.8 PvP (Classic Combat)" : `How to play ${kitName}`;
  const headLead = isOld
    ? "The written 1.8 course — the classic no-cooldown combat system: clicking speed, non-stop combos, block-hitting and combo potpvp. A completely different game from 1.9+."
    : (LEADS[k] || LEADS.neth);
  const TABS = [
    ["neth","■ Netherite Pot"],["dia","◆ Diamond Pot"],["sword","⚔ Sword"],
    ["smp","⬢ SMP"],["diasmp","❖ Diamond SMP"],["crystal","✵ Crystal"],["mace","⬗ Mace"],
    ["vanilla","◇ Vanilla"],["uhc","♁ UHC"],["axe","⛏ Axe"],
  ];

  return `
  <div class="guide">
    <nav class="gtoc" aria-label="Guide contents">
      <h5>Sections</h5>
      ${ACTIVE.map(([id, t, icon]) => `<button data-jump="${id}"><span class="gt-icon">${icon}</span>${t}</button>`).join("")}
    </nav>
    <div class="gbody">
      <div class="gver" role="tablist" aria-label="Combat version">
        <button class="${!isOld ? "on" : ""}" data-gver="1.9" role="tab" aria-selected="${!isOld}">1.9+ PvP</button>
        <button class="${isOld ? "on" : ""}" data-gver="1.8" role="tab" aria-selected="${isOld}">1.8 PvP</button>
      </div>
      ${isOld ? "" : `<div class="gkits" role="tablist" aria-label="Choose mode">
        ${TABS.map(([m, label]) => `<button class="g${m} ${k === m ? "on" : ""}" data-gkit="${m}" role="tab" aria-selected="${k === m}">${label}</button>`).join("")}
      </div>`}
      <h1>${headTitle}</h1>
      <p class="glead">${headLead}</p>
      ${ACTIVE.map(([id, t, icon, body], i) => `
        <section class="gsec" id="${id}">
          <h2><span class="gnum">${String(i+1).padStart(2,"0")}</span><span class="gt-icon big">${icon}</span>${t}</h2>
          ${body}
        </section>`).join("")}
    </div>
  </div>`;
}

const parseYtId = url => {
  const m = String(url).match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/);
  return m ? m[1] : null;
};

let adminDraft = null;

async function adminFetch(){
  const id = parseYtId($("#a-url").value.trim());
  if(!id) return toast("That doesn't look like a YouTube link");
  toast("Fetching metadata…");
  let title = "", creator = "";
  try{
    const r = await fetch(`https://noembed.com/embed?url=${encodeURIComponent("https://www.youtube.com/watch?v=" + id)}`);
    const j = await r.json();
    title = j.title || ""; creator = j.author_name || "";
  }catch(e){ /* offline — user fills in by hand via JSON later */ }
  adminDraft = { id, title, creator };
  $("#a-pthumb").src = thumb(id);
  $("#a-ptitle").textContent = title || "(title unavailable offline — will hydrate on load)";
  $("#a-pcreator").textContent = creator;
  $("#a-preview").classList.add("show");
  toast(title ? "Metadata fetched" : "Got the video — metadata will hydrate later");
}

function adminBuild(){
  if(!adminDraft) { toast("Fetch a YouTube URL first"); return null; }
  const topics = [...document.querySelectorAll("#a-topics .chip.on")].map(b => b.dataset.topic);
  const picked = [...document.querySelectorAll("#a-modes .chip.on")].map(b => b.dataset.mode);
  const modes = [picked[0] || "fund"];   // exactly one mode; default Fundamentals
  return {
    id: adminDraft.id,
    title: adminDraft.title || "Untitled (pending hydrate)",
    creator: adminDraft.creator || "",
    hydrate: !adminDraft.title,
    desc: $("#a-desc").value.trim() || "Community-added training video.",
    level: $("#a-level").value,
    ver: ($("#a-ver") && $("#a-ver").value) || "1.9",
    modes,
    format: $("#a-format").value,
    topics: topics.length ? topics : ["General"],
    tags: $("#a-tags").value.split(",").map(s => s.trim()).filter(Boolean),
    date: $("#a-date").value || null,
    duration: $("#a-dur").value.trim() || null
  };
}

function adminSave(){
  const v = adminBuild(); if(!v) return;
  if(store.byId(v.id)) return toast("That video is already in the library");
  v.addedAt = Date.now();
  store.videos.push(v);
  store.removedIds.delete(v.id);           // in case it was previously removed
  store.remoteVideoIds.add(v.id);
  store.finalize();
  if(window.potDB && store.isAdmin){
    window.potDB.saveVideo(v)
      .then(() => toast("Added & published to the site"))
      .catch(() => toast("Added, but publishing failed — check your connection"));
  } else {
    toast("Added for this session — sign in as admin to publish");
  }
  $("#a-jsonpre").textContent = JSON.stringify(v, null, 2) + ",";
  $("#a-out").classList.add("show");
  route();
}

/* shared removal used by both the link box and the added-videos list */
function removeVideoById(id){
  const v = store.byId(id);
  const title = v ? v.title : id;
  store.videos = store.videos.filter(x => x.id !== id);
  store.removedIds.add(id);
  store.remoteVideoIds.delete(id);
  try{                                      // also drop from this browser's old local cache
    const saved = JSON.parse(localStorage.getItem("potlab_custom") || "[]").filter(x => x.id !== id);
    localStorage.setItem("potlab_custom", JSON.stringify(saved));
  }catch(e){}
  if(window.potDB && store.isAdmin){
    window.potDB.removeVideo(id)
      .then(() => toast("Removed “" + title + "” from the site"))
      .catch(() => toast("Removed here, but the change didn't save — check your connection"));
  } else {
    toast("Removed for this session");
  }
  route();
}

/* --------------------------- ROUTER ----------------------------
   Some sandboxed previews block location/hash changes, which made
   nav links appear dead. Routing now runs off an internal variable;
   the URL hash is synced as a best-effort bonus for real browsers
   (deep links + back/forward still work there). */
/* ================================================================
   ACCOUNTS · HISTORY · RECOMMENDATIONS
   ----------------------------------------------------------------
   Auth is real (Firebase, wired in the module script at the bottom).
   History is stored per-account in localStorage under the user's uid,
   so two accounts on the same browser stay separate. To make history
   follow a user across devices, swap the HISTORY read/write calls for
   Firestore (one clean change — see note in the module script).
   ================================================================ */

/* --- who may open the admin panel (by account email, not password) ---
   Add the email of any account that should be an admin. When that
   person signs in with Firebase, they get the admin panel. */
const ADMIN_EMAILS = [
  "valus779@gmail.com",   // Admirax
];

/* recency-weighted, capped activity log kept per account */
const HISTORY = {
  data: { views:[], searches:[], clicks:[] },
  uid: null,
  _saveT: null,
  localKey(uid){ return "potlab_hist_" + (uid || "guest"); },
  norm(h){
    return {
      views:    Array.isArray(h && h.views)    ? h.views    : [],
      searches: Array.isArray(h && h.searches) ? h.searches : [],
      clicks:   Array.isArray(h && h.clicks)   ? h.clicks   : []
    };
  },
  _readLocal(uid){
    try{ return this.norm(JSON.parse(localStorage.getItem(this.localKey(uid)) || "{}")); }
    catch(e){ return { views:[], searches:[], clicks:[] }; }
  },
  _cacheLocal(){ try{ localStorage.setItem(this.localKey(this.uid), JSON.stringify(this.data)); }catch(e){} },
  /* load a signed-in user's history: show local cache instantly, then
     replace with the authoritative Firestore copy so it's the same on
     every device */
  async load(uid){
    this.uid = uid;
    this.data = this._readLocal(uid);
    route();
    if(window.potDB && uid){
      try{
        const remote = await window.potDB.loadHistory(uid);
        if(remote){ this.data = this.norm(remote); this._cacheLocal(); route(); }
        else { this._persist(); }        // first time on this account — seed remote from local
      }catch(e){ /* offline — keep local */ }
    }
  },
  reset(){ this.uid = null; this.data = { views:[], searches:[], clicks:[] }; },
  read(){ return this.data; },
  _persist(){
    this._cacheLocal();                  // instant, offline-safe
    if(window.potDB && this.uid){        // sync to the cloud, debounced
      clearTimeout(this._saveT);
      const snap = JSON.stringify(this.data);
      this._saveT = setTimeout(() => { window.potDB.saveHistory(this.uid, JSON.parse(snap)).catch(()=>{}); }, 1200);
    }
  },
  logView(id){
    if(!store.user) return;              // only track signed-in accounts
    this.data.views = [{ id, t: Date.now() }, ...this.data.views.filter(v => v.id !== id)].slice(0, 100);
    this._persist();
  },
  logClick(id){
    if(!store.user || !id) return;
    this.data.clicks = [{ id, t: Date.now() }, ...this.data.clicks.filter(c => c.id !== id)].slice(0, 100);
    this._persist();
  },
  logSearch(q){
    if(!store.user) return;
    q = String(q || "").trim().toLowerCase();
    if(q.length < 2) return;
    this.data.searches = [{ q, t: Date.now() }, ...this.data.searches.filter(s => s.q !== q)].slice(0, 40);
    this._persist();
  },
  clear(){
    this.data = { views:[], searches:[], clicks:[] };
    this._cacheLocal();
    if(window.potDB && this.uid) window.potDB.saveHistory(this.uid, this.data).catch(()=>{});
  }
};

/* recentEngaged — videos the user has opened or clicked, newest first */
function recentEngaged(){
  const h = HISTORY.read();
  const seen = new Set();
  const out = [];
  for(const e of [...h.views, ...h.clicks].sort((a,b) => b.t - a.t)){
    if(seen.has(e.id)) continue;
    const v = store.byId(e.id);
    if(v){ seen.add(e.id); out.push(v); }
  }
  return out;
}

/* buildProfile — turn the account's history into weighted tastes.
   Newer activity counts more (halves roughly every ~2 weeks). */
function buildProfile(){
  const h = HISTORY.read();
  const now = Date.now();
  const HALF = 1000*60*60*24*14;                    // 14-day half-life
  const decay = t => Math.pow(0.5, (now - t) / HALF);
  const prof = { modes:{}, topics:{}, creators:{}, levels:{}, terms:{} };
  const bump = (o, k, w) => { if(k) o[k] = (o[k]||0) + w; };

  const addVideo = (id, t, base) => {
    const v = store.byId(id); if(!v) return;
    const w = base * decay(t);
    bump(prof.modes, v.modes[0], w);
    (v.topics||[]).forEach(tp => bump(prof.topics, tp, w));
    bump(prof.creators, v.creator, w * 1.2);
    bump(prof.levels, v.level, w * 0.5);
  };
  h.views.forEach(e => addVideo(e.id, e.t, 2));     // opening a detail page = strong
  h.clicks.forEach(e => addVideo(e.id, e.t, 3));    // clicking through to YouTube = strongest
  h.searches.forEach(e => {
    const w = decay(e.t);
    e.q.split(/\s+/).filter(x => x.length > 2).forEach(term => bump(prof.terms, term, w));
  });
  return prof;
}

function hasHistory(){
  const h = HISTORY.read();
  return h.views.length || h.clicks.length || h.searches.length;
}

/* recommend — score every unseen-ish video against the taste profile.
   Returns { list, reasons } where reasons[id] explains the top match. */
function recommend(limit = 12){
  const prof = buildProfile();
  const engagedIds = new Set(recentEngaged().map(v => v.id));
  const scored = [];

  for(const v of store.videos){
    let score = 0;
    const why = [];
    const mw = prof.modes[v.modes[0]] || 0;
    if(mw){ score += mw * 3; why.push(["mode", MODES[v.modes[0]], mw]); }
    for(const tp of (v.topics||[])){
      const tw = prof.topics[tp] || 0;
      if(tw){ score += tw * 2; why.push(["topic", tp, tw]); }
    }
    const cw = prof.creators[v.creator] || 0;
    if(cw){ score += cw * 4; why.push(["creator", v.creator, cw]); }
    score += (prof.levels[v.level] || 0);
    // search-term matches against this video's text
    const hay = [v.title, v.creator, (v.topics||[]).join(" "), (v.tags||[]).join(" ")].join(" ").toLowerCase();
    for(const term in prof.terms){ if(hay.includes(term)){ score += prof.terms[term] * 1.5; why.push(["search", term, prof.terms[term]]); } }
    // gently downrank things already engaged so the feed keeps surfacing new stuff
    if(engagedIds.has(v.id)) score *= 0.25;
    if(score > 0) scored.push({ v, score, why });
  }

  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, limit);
  const reasons = {};
  for(const s of top){
    const best = s.why.sort((a,b) => b[2] - a[2])[0];
    if(best){
      reasons[s.v.id] =
        best[0] === "creator" ? `Because you watch ${best[1]}` :
        best[0] === "mode"    ? `More ${best[1]} for you` :
        best[0] === "search"  ? `Matches your search “${best[1]}”` :
                                `Because you like ${best[1]}`;
    }
  }
  return { list: top.map(s => s.v), reasons };
}
