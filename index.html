function authError(msg){
  const el = $("#au-err");
  if(el){ el.textContent = msg; el.style.display = "block"; el.classList.remove("ok"); }
  else toast(msg);
}
function authNotice(msg){
  const el = $("#au-err");
  if(el){ el.textContent = msg; el.style.display = "block"; el.classList.add("ok"); }
  else toast(msg);
}
async function authAction(kind){
  if(!window.potAuth){ authError("Auth is still loading — try again in a second."); return; }
  const email = ($("#au-email") && $("#au-email").value || "").trim();
  const pass  = ($("#au-pass")  && $("#au-pass").value  || "");
  try{
    if(kind === "google") await window.potAuth.google();
    else if(kind === "signin"){
      if(!email || !pass) return authError("Enter your email and password.");
      const cred = await window.potAuth.signInEmail(email, pass);
      if(cred && cred.user && !cred.user.emailVerified){
        await window.potAuth.resend().catch(()=>{});
        await window.potAuth.signOut();
        return authError("Please verify your email first — we just re-sent the link to " + email + ". Check your inbox (and spam).");
      }
    } else if(kind === "signup"){
      if(!email || pass.length < 6) return authError("Enter an email and a password of at least 6 characters.");
      await window.potAuth.signUpEmail(email, pass);
      await window.potAuth.signOut();                 // must verify before the account works
      return authNotice("Account created! We sent a verification link to " + email + ". Click it, then sign in.");
    } else if(kind === "reset"){
      if(!email) return authError("Type your email in the box above, then tap “Forgot password?” again.");
      await window.potAuth.reset(email);
      return authNotice("Password reset link sent to " + email + ". Check your inbox to set a new password.");
    }
  }catch(err){
    authError(prettyAuthError(err));
  }
}
function prettyAuthError(err){
  const c = (err && err.code) || "";
  if(c.includes("invalid-credential") || c.includes("wrong-password") || c.includes("user-not-found"))
    return "This account is incorrect or doesn’t exist. Want to create one? Tap “Create an account” below ↓";
  if(c.includes("email-already-in-use")) return "That email already has an account — try signing in.";
  if(c.includes("invalid-email"))        return "That doesn’t look like a valid email.";
  if(c.includes("missing-email"))        return "Enter your email first.";
  if(c.includes("weak-password"))        return "Password is too weak (use at least 6 characters).";
  if(c.includes("too-many-requests"))    return "Too many attempts — wait a minute and try again.";
  if(c.includes("popup-closed"))         return "Sign-in was cancelled.";
  if(c.includes("unauthorized-domain"))  return "This domain isn’t authorized in Firebase yet (add it under Authentication → Settings).";
  if(c.includes("popup-blocked"))        return "Your browser blocked the Google popup — allow popups and retry.";
  return "Something went wrong. Please try again.";
}

/* treat unverified email/password accounts as not signed in */
function isPasswordProvider(user){
  return !!(user && user.providerData && user.providerData.some(p => p.providerId === "password"));
}

/* called by the Firebase module whenever sign-in state changes */
window.onPotUserChanged = function(user){
  if(user && !user.emailVerified && isPasswordProvider(user)){
    store.user = null; store.isAdmin = false;   // gate: verification required
    updateAcctLink(); HISTORY.reset(); route();
    return;
  }
  store.user = user || null;
  store.isAdmin = !!(user && user.email && ADMIN_EMAILS
      .map(e => e.toLowerCase()).includes(user.email.toLowerCase()));
  updateAcctLink();
  if(user){ HISTORY.load(user.uid); }   // pull this account's history (cross-device)
  else { HISTORY.reset(); }
  route();
};

/* called by the Firebase module once Firestore is ready */
window.onPotDBReady = function(){
  loadRemoteVideos();                    // merge the shared video library
  if(store.user) HISTORY.load(store.user.uid);
};
function updateAcctLink(){
  const link = $("#acctlink");
  if(!link) return;
  if(store.user){
    const name = (store.user.displayName || store.user.email || "Account").split(/[ @]/)[0];
    link.textContent = store.isAdmin ? name + " ★" : name;
  } else {
    link.textContent = "Sign in";
  }
}

const app = $("#app");
let currentRoute = location.hash || "#/";

function nav(to){
  currentRoute = to;
  try{ if(location.hash !== to) location.hash = to; }catch(e){ /* sandboxed */ }
  route();
}

function route(){
  const h = currentRoute;
  const navKey = h.startsWith("#/admin") ? "admin"
    : h.startsWith("#/guide") ? "guide"
    : h.startsWith("#/foryou") ? "foryou"
    : h.startsWith("#/account") ? "account"
    : "home";
  document.querySelectorAll("[data-nav]").forEach(a =>
    a.classList.toggle("active", a.dataset.nav === navKey));
  if(h.startsWith("#/video/")){
    const v = store.byId(h.slice(8));
    if(v) HISTORY.logView(v.id);                 // record that this account opened it
    app.innerHTML = v ? detailHTML(v)
      : `<div class="shell"><div class="empty"><b>Video not found</b><a href="#/" style="color:var(--emerald)">Back to library</a></div></div>`;
    window.scrollTo(0,0);
  } else if(h.startsWith("#/foryou")){
    app.innerHTML = forYouHTML();
    window.scrollTo(0,0);
  } else if(h.startsWith("#/account")){
    app.innerHTML = accountHTML();
    window.scrollTo(0,0);
  } else if(h.startsWith("#/guide")){
    app.innerHTML = guideHTML();
    window.scrollTo(0,0);
    setupGuideScrollSpy();
  } else if(h.startsWith("#/admin")){
    // Admin panel now requires a signed-in account whose email is whitelisted.
    if(store.isAdmin){ app.innerHTML = adminHTML(); }
    else if(store.user){ app.innerHTML = `<div class="shell"><div class="empty"><b>Not an admin account</b>You’re signed in, but this account doesn’t have admin access.<br><a href="#/" style="color:var(--emerald)">Back to library</a></div></div>`; }
    else { app.innerHTML = `<div class="shell"><div class="empty"><b>Admins only</b>Sign in with an admin account to continue.<br><a href="#/account" style="color:var(--emerald)">Go to sign in →</a></div></div>`; }
    window.scrollTo(0,0);
  } else {
    app.innerHTML = homeHTML();
  }
}
window.addEventListener("hashchange", () => {          // browser back/forward
  if(location.hash !== currentRoute){ currentRoute = location.hash || "#/"; route(); }
});
/* intercept internal links so navigation works even if the sandbox
   blocks hash changes — external (YouTube) links pass through */
document.addEventListener("click", e => {
  const a = e.target.closest('a[href^="#/"], a[href="#/"]');
  if(!a) return;
  e.preventDefault();
  nav(a.getAttribute("href"));
});

/* record click-throughs to YouTube as the strongest interest signal */
document.addEventListener("click", e => {
  const yt = e.target.closest('a[href*="youtube.com"], a[href*="youtu.be"]');
  if(!yt) return;
  const id = parseYtId(yt.getAttribute("href"));
  if(id) HISTORY.logClick(id);
}, true);

/* click (or Enter/Space) on the detail-page player starts inline playback */
document.addEventListener("click", e => {
  const p = e.target.closest(".dplayer");
  if(p) playInline(p);
});

/* highlight the guide section currently in view within the TOC */
let guideObserver = null;
function setupGuideScrollSpy(){
  if(guideObserver) guideObserver.disconnect();
  const tocBtns = [...document.querySelectorAll('.gtoc button[data-jump]')];
  const map = new Map(tocBtns.map(b => [b.dataset.jump, b]));
  guideObserver = new IntersectionObserver(entries => {
    for(const e of entries){
      if(e.isIntersecting){
        tocBtns.forEach(b => b.classList.remove("active"));
        map.get(e.target.id)?.classList.add("active");
      }
    }
  }, { rootMargin: "-15% 0px -70% 0px", threshold: 0 });
  document.querySelectorAll(".gsec").forEach(s => guideObserver.observe(s));
}

/* ------------------------ interactions ------------------------- */
function toast(msg){
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 2600);
}

let qTimer;
$("#q").addEventListener("input", e => {
  clearTimeout(qTimer);
  qTimer = setTimeout(() => {
    store.query = e.target.value.trim();
    HISTORY.logSearch(store.query);              // remember searches for recommendations
    if(currentRoute === "#/" || currentRoute === "") route();
    else if(store.query) nav("#/");
  }, 120); // instant-feel debounce
});

/* single delegated click handler — filters, doors, admin */
document.addEventListener("click", e => {
  const t = e.target.closest("button, .clear");
  if(!t) return;

  if(t.dataset.fg){                               // filter chip
    const set = store.filters[t.dataset.fg];
    set.has(t.dataset.fv) ? set.delete(t.dataset.fv) : set.add(t.dataset.fv);
    const drawerOpen = $("#topicdrawer")?.classList.contains("open");
    route();
    if(drawerOpen){ $("#topicdrawer")?.classList.add("open"); $("#topictoggle")?.setAttribute("aria-expanded","true"); }
    return;
  }
  if(t.id === "topictoggle"){
    const d = $("#topicdrawer");
    const open = d.classList.toggle("open");
    t.setAttribute("aria-expanded", open);
    return;
  }
  if(t.id === "clearfilters"){
    Object.values(store.filters).forEach(s => s.clear());
    store.query = ""; $("#q").value = "";
    route(); return;
  }
  if(t.dataset.gkit){                             // guide kit tabs
    store.guideKit = t.dataset.gkit;
    route(); return;
  }
  if(t.dataset.gver){                             // guide combat-version toggle
    store.guideVer = t.dataset.gver;
    route(); return;
  }
  if(t.dataset.jump){                             // scroll to a section
    document.getElementById(t.dataset.jump)?.scrollIntoView({behavior:"smooth", block:"start"});
    return;
  }
  if(t.dataset.door){                             // hero kit doors
    Object.values(store.filters).forEach(s => s.clear());
    store.filters.kit.add(t.dataset.door);
    route();
    $(".filters")?.scrollIntoView({behavior:"smooth"});
    return;
  }
  if(t.dataset.topic){                            // admin topic picker
    t.classList.toggle("on");
    t.setAttribute("aria-pressed", t.classList.contains("on"));
    return;
  }
  if(t.dataset.mode){                             // admin mode picker (single-select)
    const wasOn = t.classList.contains("on");
    document.querySelectorAll("#a-modes .chip").forEach(c => { c.classList.remove("on"); c.setAttribute("aria-pressed","false"); });
    if(!wasOn){ t.classList.add("on"); t.setAttribute("aria-pressed","true"); }
    return;
  }
  // ---- account / auth buttons ----
  if(t.id === "au-google"){ authAction("google"); return; }
  if(t.id === "au-signin"){ authAction("signin"); return; }
  if(t.id === "au-signup"){ authAction("signup"); return; }
  if(t.id === "au-forgot"){ authAction("reset"); return; }
  if(t.id === "acct-signout"){ window.potAuth && window.potAuth.signOut(); return; }
  if(t.id === "acct-clear"){ HISTORY.clear(); toast("History cleared"); route(); return; }

  if(t.dataset.rm){ removeVideoById(t.dataset.rm); return; }   // remove from added-videos list
  if(t.id === "a-fetch") return adminFetch();
  if(t.id === "a-save")  return adminSave();
  if(t.id === "a-rmfind") return adminRemoveFind();
  if(t.id === "a-rmgo")   return adminRemoveGo();
  if(t.id === "a-logout"){ window.potAuth && window.potAuth.signOut(); nav("#/"); return; }
  if(t.id === "a-json"){
    const v = adminBuild(); if(!v) return;
    $("#a-jsonpre").textContent = JSON.stringify(v, null, 2) + ",";
    $("#a-out").classList.add("show");
  }
});
document.addEventListener("keydown", e => {
  if(e.key === "Enter" && e.target.id === "a-url"){ e.preventDefault(); adminFetch(); }
  if(e.key === "Enter" && e.target.id === "a-rmurl"){ e.preventDefault(); adminRemoveFind(); }
  if((e.key === "Enter" || e.key === " ") && e.target.classList && e.target.classList.contains("dplayer")){ e.preventDefault(); playInline(e.target); }
  if(e.key === "Enter" && e.target.id === "au-pass"){ e.preventDefault(); authAction("signin"); }
  // Hidden staff access — Ctrl+Alt+A opens the restricted login (no visible link)
  if(e.altKey && e.ctrlKey && (e.key === "a" || e.key === "A")){ e.preventDefault(); nav("#/admin"); }
});

/* ---------------------------- boot ----------------------------- */
store.load();
route();
hydrate();
</script>

<!-- ============================================================
     FIREBASE AUTH (loaded from CDN — no npm/build step needed)
     Exposes window.potAuth and notifies the app via onPotUserChanged.
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence,
    GoogleAuthProvider, signInWithPopup,
    signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut,
    sendEmailVerification, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQ3BYddcvixB-kIsGJ6NiOfmQkqFSpCpE",
    authDomain: "potlabs.firebaseapp.com",
    projectId: "potlabs",
    storageBucket: "potlabs.firebasestorage.app",
    messagingSenderId: "273655359837",
    appId: "1:273655359837:web:ad66f9e8474be84e5120b4"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  setPersistence(auth, browserLocalPersistence).catch(() => {});   // stay signed in across visits

  const provider = new GoogleAuthProvider();

  window.potAuth = {
    google:      () => signInWithPopup(auth, provider),
    signInEmail: (e, p) => signInWithEmailAndPassword(auth, e, p),
    signUpEmail: async (e, p) => {
      const cred = await createUserWithEmailAndPassword(auth, e, p);
      try{ await sendEmailVerification(cred.user); }catch(_){}
      return cred;
    },
    resend: () => auth.currentUser ? sendEmailVerification(auth.currentUser) : Promise.reject(new Error("no-user")),
    reset:  (e) => sendPasswordResetEmail(auth, e),
    signOut: () => signOut(auth)
  };

  // Firestore data layer: shared video library + cross-device history
  window.potDB = {
    async loadVideos(){
      const snap = await getDocs(collection(db, "videos"));
      const out = []; snap.forEach(d => out.push({ id: d.id, ...d.data() }));
      return out;
    },
    saveVideo(v){ return setDoc(doc(db, "videos", v.id), v); },
    removeVideo(id){ return setDoc(doc(db, "videos", id), { id, removed: true }); },
    async loadHistory(uid){
      const d = await getDoc(doc(db, "history", uid));
      return d.exists() ? d.data() : null;
    },
    saveHistory(uid, data){ return setDoc(doc(db, "history", uid), data); }
  };

  if (typeof window.onPotDBReady === "function") window.onPotDBReady();

  onAuthStateChanged(auth, user => {
    if (typeof window.onPotUserChanged === "function") window.onPotUserChanged(user);
  });
</script>
